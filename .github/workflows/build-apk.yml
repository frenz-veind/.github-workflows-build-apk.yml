name: Build APK

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20  # atau 22, tapi 20 lebih stabil untuk Capacitor 5

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Install dependencies & Capacitor
        run: |
          npm ci  # lebih baik daripada manual create package.json
          npx cap add android || echo "Android platform already exists"

      - name: Copy assets
        run: npx cap copy android

      - name: Fix Gradle settings
        run: |
          cd android
          # Perbaikan utama
          sed -i '/capacitor-android/d' settings.gradle 2>/dev/null || true
          echo "include ':capacitor-android'" >> settings.gradle
          echo "project(':capacitor-android').projectDir = new File('../node_modules/@capacitor/android/capacitor')" >> settings.gradle

          chmod +x gradlew

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --stacktrace
