name: Build APK

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Install Capacitor
        run: |
          npm init -y
          npm install @capacitor/core@5 @capacitor/cli@5 @capacitor/android@5

      - name: Add Android Platform
        run: npx cap add android

      - name: Copy Web Assets
        run: npx cap copy android

      - name: Fix Gradle Settings
        run: |
          cd android
          
          # Fix capacitor-android path
          echo "include ':capacitor-android'" >> settings.gradle
          echo "project(':capacitor-android').projectDir = new File('../node_modules/@capacitor/android/capacitor')" >> settings.gradle
          
          chmod +x gradlew

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --stacktrace
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: yanz-ai-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
