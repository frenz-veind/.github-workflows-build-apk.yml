name: Build APK

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Capacitor
        run: |
          echo '{"name":"yanz-ai","version":"1.0.0"}' > package.json
          npm install @capacitor/core@5 @capacitor/cli@5 @capacitor/android@5

      - name: Write Capacitor Config
        run: |
          echo '{"appId":"com.yanz.ai","appName":"Yanz AI","webDir":"www","backgroundColor":"#05070d"}' > capacitor.config.json

      - name: Add Android
        run: npx cap add android

      - name: Copy Web Assets
        run: npx cap copy android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: yanz-ai-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
